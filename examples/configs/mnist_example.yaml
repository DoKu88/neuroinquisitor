name: MNIST Example
description: Full NeuroInquisitor feature showcase on MNIST classification — CapturePolicy, RunMetadata, Snapshots, SnapshotCollection, ReplaySession, and Visualization.
tags:
  - full-showcase
  - mnist
  - cnn
